# state-of-llm configuration.
# Models are tested through the real CLIs you code with, inheriting your real
# settings (~/.claude/settings.json effort, ~/.codex/config.toml model/effort).
# That is deliberate: this measures the daily driver, not the raw API.

[run]
trials = 6            # runs per (model, task); the power budget
concurrency = 8       # parallel agent processes
default_timeout_s = 480
keep_workspace_days = 7

[schedule]
# Dead-man's switch: nightly auto-runs happen while today <= auto_until.
# The morning after, the job uninstalls its own launchd plist and notifies,
# so the bake-in can't silently run forever. Renew: bump the date, then
# `solm schedule install`. Aligned with the burn-in window's end on purpose:
# unsealing day and renew-or-retire day are the same decision.
auto_until = "2026-08-05"

[anchor]
# Frozen-set runs folded into the nightly job. 1 rep x 30 items x 2 models.
# Cadence lever: daily = false to run manually via `solm anchor run`.
daily = true
sets = ["aime30"]

[pricing]
# USD per million tokens, for estimating codex API spend (claude reports its
# own cost_usd). Grounded 2026-07-22 against OpenAI's published gpt-5.6 rates.
# Cache reads bill at ~10% of input, so estimates show a low-high range.
"codex-sol-xhigh" = { input = 5.0, output = 30.0 }

[burnin]
# Full-blind validation window: notifications go verdict-free, and verdict/
# report/burnin seal their output (--unseal to break the blind deliberately).
# Log your gut daily: solm gut fine|off. Comparison unlocks when the window ends.
blind = true
start = "2026-07-22"
days = 14

[stats]
# Composite points that actually matter: ~20% degradation (~15 pts) is the
# touch-grass line. Smaller sustained decay still surfaces via the CUSUM
# drift alarm (free, multi-day, wobble-proof); one-day flux under this line
# stays advisory YELLOW at most.
material_drop = 15.0
baseline_window = 14  # trailing days for task-paired baselines
min_baseline_days = 3 # days a task needs before it enters the paired comparison
bootstrap_iters = 2000

[binaries]
# Absolute paths so launchd runs work without your interactive shell PATH.
claude = "/Users/erik/.nvm/versions/node/v22.16.0/bin/claude"
codex = "/Users/erik/.nvm/versions/node/v22.16.0/bin/codex"

[codex]
# Eval sandbox for codex runs. Your daily config is danger-full-access; eval
# tasks only need to write their own workspace, so default is safer.
sandbox = "workspace-write"
# Isolated CODEX_HOME: API-key billing + clean config for eval runs, leaving
# your interactive codex (~/.codex, ChatGPT plan, hooks, priority tier) alone.
home = "/Users/erik/.codex-solm"

[claude]
# Billing switch. false = eval runs bill the API via your exported
# ANTHROPIC_API_KEY (observed 2026-07-21: ~$1.34/run avg at xhigh, ~$80/day
# at 4 fable trials, ~$120/day at 6). true = strip the key so runs draw your
# Max plan quota instead (protects dollars, taxes the quota you code with).
strip_api_key = false

# Effort is pinned per model spec so the yardstick can't drift with settings
# edits: claude via --effort, codex via -c model_reasoning_effort.
# enabled = false keeps a spec available for `solm run --models <name>`
# without adding it to the daily battery.

[[models]]
name = "fable-xhigh"
runner = "claude"
model = "claude-fable-5"
extra_args = ["--effort", "xhigh"]
# 2-trial screen (~$40/day): detection floor ~6 pts, well under the 15-pt
# materiality line. Escalation auto-buys extra trials on suspicious days.
trials = 2

[[models]]
name = "codex-sol-xhigh"
runner = "codex"
model = "gpt-5.6-sol"
extra_args = ["-c", 'model_reasoning_effort="xhigh"']
trials = 2   # lean burn-in screen; API-billed via the isolated CODEX_HOME

[[models]]
name = "opus-xhigh"
runner = "claude"
model = "claude-opus-4-8"
extra_args = ["--effort", "xhigh"]
enabled = false

[[models]]
name = "sonnet-xhigh"
runner = "claude"
model = "claude-sonnet-5"
extra_args = ["--effort", "xhigh"]
enabled = false

[[models]]
name = "codex-terra-xhigh"
runner = "codex"
model = "gpt-5.6-terra"
extra_args = ["-c", 'model_reasoning_effort="xhigh"']
enabled = false

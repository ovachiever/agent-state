[task]
name = "gauntlet-protocol"
title = "Build wireproto.py holding 28+ constraints scattered through a long brief"
timeout_s = 600
prompt = """
Settle in, because this brief is long and none of it is filler. You are building the reference tooling for "wireproto", the text wire protocol our device fleet speaks, and the constraints below come from three years of field debugging, two interop incidents, and one very expensive recall. They are scattered through the prose the way they came up in the postmortems — read everything before you write anything, because every requirement here is load-bearing and each one is stated exactly once. The deliverable is exactly one file, wireproto.py, in the root of this repo. Nothing else — no package directory, no tests, no README. Standard library only: the field gateways run a stripped Python where a third-party import is a bricked gateway. There's a sample capture in captures/session1.stream and some notes in NOTES.md; they're illustrations for your eyeballs, not test data, and nothing you build should special-case them.

The protocol first. A frame is `#`, then a length, then `#`, then the body, then `;`. The body is the frame's fields — every frame carries at least one — joined with commas after each field has been escaped. The escape alphabet is exactly four sequences and will never grow: backslash becomes `\\\\`, comma becomes `\\c`, semicolon becomes `\\s`, and a newline (LF) becomes `\\n`. Nothing else is ever escaped — `#` appears literally in bodies and that is fine, because framing is driven by the length, not by scanning for the terminator. On the way back in, a backslash followed by anything outside that alphabet is invalid: the decoder rejects it rather than guessing. An empty body is not "no fields": it decodes to exactly one empty field, which is why there is no such thing as a zero-field frame in either direction.

The length is the number of characters — Unicode code points, not bytes — of the escaped body. This one caused the recall: a gateway counted UTF-8 bytes, the fleet counted code points, and forty thousand thermostats desynced on the first emoji in a device name. The length field itself is ASCII digits 0 through 9 only; other things Python happens to consider "digits" (Arabic-Indic numerals, superscripts) are not lengths. No leading zeros — `0` itself is the single exception — and the maximum is 99999; a well-formed digit run above that is its own distinct error, "decode: length too large", not a generic bad length.

Now the importable API, because the fleet simulator imports this file as a module. encode(fields) takes a Python list of str and returns the frame as a str. Its validation, in order: something that is not a list — and a tuple is not a list here — raises ValueError("encode: fields must be a list"); an empty list raises ValueError("encode: need at least one field"); a non-str element raises ValueError("encode: field I is not a str") where I is the index of the first offender. And if the escaped body would exceed 99999 characters, ValueError("encode: body too long"). decode(text) is the one-shot inverse: the input must be exactly one complete frame with nothing after it. Every decode failure is a ValueError, and the checks run in a fixed order so that one malformed input always produces the same complaint: first, empty input or a first character that is not `#` is "decode: missing frame start"; second, no closing `#` for the length is "decode: truncated frame"; third, the length field is validated ("decode: bad length" for empty, non-digit, or leading-zero runs, or the too-large error above); fourth, if the input is shorter than body-plus-terminator it is "decode: truncated frame" again; fifth, if the character where the terminator should be is not `;` it is "decode: missing terminator"; sixth, anything after the terminator is "decode: trailing data"; and only then, seventh, is the body itself scanned. That scan runs left to right: a backslash as the last character of the body is "decode: dangling escape", a backslash before a character outside the escape alphabet is "decode: bad escape", and a raw semicolon or raw newline inside the body is "decode: unescaped delimiter". Note the scan order's consequence and honor it: in a body containing backslash-semicolon, the backslash consumes the semicolon, so that is a bad escape, not an unescaped delimiter. The two functions are inverses by law: decode(encode(x)) == x for every valid x — empty fields, fields that are nothing but delimiters, fields ending in backslashes, emoji, all of it. We fuzz this property; treat it as the acceptance bar it is.

Then there is the stream side, which is where partner integrations always go wrong. Frames arrive over serial links in arbitrary chunks, so provide a class Decoder with three methods and a strict little state machine. feed(chunk) appends the chunk to an internal buffer, greedily extracts every complete frame now available, and returns their decoded field lists — possibly an empty list — while keeping any incomplete tail buffered. pending() returns the number of buffered, unconsumed characters. Validation is lazy and exactly as lazy as the data demands: a first buffered character that is not `#` is judged the moment it is buffered; the length field is judged only once its closing `#` has arrived (so a buffer holding `#00` is merely incomplete, and becomes "decode: bad length" only when the next `#` lands); the body is judged only once the full window plus its terminator are present. Stream-mode errors carry the same messages as one-shot decode — trailing data excepted, since a stream by definition continues. When a feed does raise, any frames that same call had already extracted are lost — there is no partial delivery from a failing call — and the decoder is poisoned: every later feed raises ValueError("feed: decoder is poisoned") and close raises ValueError("close: decoder is poisoned"). A healthy close with an empty buffer returns None and is idempotent; a close with buffered data raises ValueError("close: incomplete frame") and leaves the decoder open, so more feeds may still complete the frame; after a successful close, feed raises ValueError("feed: decoder is closed").

The CLI, because field techs drive this from a shell. `python wireproto.py encode F1 F2 ...` treats each remaining argument as one field and prints the frame to stdout followed by a newline, exiting 0. `encode` with no fields at all prints exactly "error: need at least one field" to stderr and exits 2. `python wireproto.py decode` — decode takes no further arguments — reads all of stdin as one stream, and on success prints one line per frame, each line being that frame's fields re-escaped and joined with commas (the escaped body, so the output is unambiguous and single-line no matter what the fields contain), then exits 0; empty stdin is a valid empty stream, producing no output and exit 0. If the stream content is malformed, print "error: " followed by the exact decode message to stderr and exit 3. If the stream simply ends mid-frame, that is the close error: "error: close: incomplete frame" to stderr and exit 4. `--version`, as the sole argument, prints exactly "wireproto 1.4.2" and exits 0 — the fleet manifest pins on that literal line. Any other invocation — no command, an unknown command, extra arguments after decode or --version — prints exactly "error: usage: wireproto.py {encode,decode,--version}" to stderr and exits 2. Two hygiene rules bind all of this: on any successful run stderr stays completely empty, and on any failing run stdout stays completely empty — no partial output before the error, which means decode buffers its lines until the whole stream has parsed. And importing wireproto as a module must run nothing and print nothing: the CLI lives behind the usual main guard.

That's the brief. Thirty-odd exact behaviors, one file, no dependencies. The partners who will reimplement this from the same document get no slack on a single byte of it, and neither does the reference.
"""

[task.weights]
plot = 1.0
intelligence = 0.4
diligence = 0.3

[task]
name = "bugfix-topk-stream"
title = "Fix a subtly buggy streaming top-k tracker to meet its docstring spec"
timeout_s = 420
prompt = """
The file topk.py contains TopK, a streaming top-k tracker, and it has bugs. The class docstring is the complete spec — read every clause carefully and make the implementation satisfy all of them, including the tie rule, capacity boundaries, add()'s return value, and snapshot independence. Do not change the docstring, the class name, or any method signature. The basic test in test_basic.py already passes; that is not sufficient. Fix the implementation so it is fully correct against the spec.
"""

[task.weights]
intelligence = 1.0
tool_use = 0.1
diligence = 0.3
plot = 0.1

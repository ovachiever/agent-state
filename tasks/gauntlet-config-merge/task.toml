[task]
name = "gauntlet-config-merge"
title = "Build cfgmerge.py holding 20+ constraints scattered through a long brief"
timeout_s = 480
prompt = """
Okay, deep breath, because this brief has history and I'm going to give you all of it. The requirements are scattered through the whole note — some of them hide mid-paragraph — and every single one is load-bearing, so read to the end before you write a line. The deliverable is exactly one file, cfgmerge.py, in the root of this repo. Nothing else: no package directory, no tests, no requirements.txt, just that file.

Context: our deploy pipeline builds a runtime config by layering JSON files. There's a base config checked into each service repo, then an environment file (staging, prod, whatever), then sometimes a local overrides file an engineer keeps out of git. For years the layering was done by a 40-line sed-and-jq monstrosity that lived in a Jenkins job nobody would touch. Last month it silently dropped a TLS block during a prod deploy and we spent a very bad Tuesday: forty minutes of cert errors, a rollback that itself failed because the rollback read the same merged artifact, and a status page update that used the word "degraded" four times. The post-incident review ran ninety minutes, the word "sed" was spoken like a slur, and the action item — verbatim from the doc — is "replace the layering step with a small auditable tool owned by a human being." That's this. So: a real tool, small enough to read top to bottom with coffee in hand. I've dropped three sample files in this repo — base.json, staging.json, local.json — purely so you can eyeball realistic shapes; they're illustrations, not test data, and nothing you build should hardcode anything about them.

The command line looks like this: the script takes one or more JSON file paths as positional arguments, and their order on the command line IS the precedence order — files are merged left to right, so a value in a later file beats the same value in an earlier file. At least one file is required. Standard library only, and I mean it: the pipeline runners are hermetic images with bare Python, so any third-party import means the tool simply doesn't run there. While I'm listing decisions from that review: we explicitly rejected environment-variable interpolation. No ${VAR} expansion, no .env loading, no "smart" substitution of any kind — a config file says exactly what it says, and the one team that wanted interpolation was told to template their JSON upstream. Please don't add it.

Merge semantics, the heart of the thing. When the same key holds an object in both layers, merge them recursively — deep merge, keys from both sides survive, and the recursion applies all the way down. When the same key holds anything that isn't two objects — strings, numbers, whatever — the later layer's value replaces the earlier one outright. Arrays are the case people argue about, so hear the decision: arrays REPLACE wholesale. Never concatenate, never merge element-by-element, never dedupe. If staging defines a list of feature flags, that whole list wins over base's list, period. We did debate an "$append" sentinel for arrays and decided against it — please don't implement any array-merging cleverness, someone always tries.

Deletion. Sometimes an environment needs to remove a key the base defines, not override it. The sentinel for that is the exact string "$delete": when a later layer sets a key to "$delete", that key is absent from the final output entirely. This works at any depth — a nested "$delete" rides the deep merge down and removes just that nested key. Deleting a key that no lower layer ever defined is a quiet no-op, not an error. Two edges people get wrong: first, the sentinel only means "delete" when it appears as the direct value of an object key — inside an array it is just an ordinary string and passes through untouched. Second, if a layer deletes a key and a later layer sets it again, the later value simply wins; the delete doesn't poison the key forever.

Output. The merged result prints to stdout as JSON, and the formatting is contractual because we diff these artifacts in CI: object keys sorted alphabetically at every nesting level, 2-space indentation, and the output ends with exactly one trailing newline. Non-ASCII characters in string values must pass through as literal UTF-8, not \\uXXXX escapes — our German service names were unreadable in the old tool's output and it drove the Berlin team nuts. Note this canonicalization applies even when you pass a single file: one file in, that same config out, re-serialized into exactly this canonical form. There is no --output flag and don't add one; stdout is the interface, the pipeline redirects it.

Now strict mode, which exists because of that bad Tuesday. There's a --strict flag. To talk about it we need the type taxonomy: every JSON value is one of object, array, string, number, boolean, or null — those exact six names — and booleans are NOT numbers, even though certain languages blur that. A type conflict is when a key exists in both the merged-so-far result and the incoming layer with values of two different types from that list. Without --strict, a conflict is not an error: the later value replaces the earlier one and the tool stays quiet about it. WITH --strict, a conflict aborts the run: print exactly "error: type conflict at PATH: OLDTYPE vs NEWTYPE" to stderr — where PATH is the dotted path from the root (like server.tls.port, no leading dot; a top-level key is just the bare key), OLDTYPE is the type already in place from earlier layers, and NEWTYPE is the incoming type — then exit with code 4, printing nothing at all to stdout. One carve-out: the "$delete" sentinel never participates in conflict checking in either direction, even under --strict; it's an instruction, not a string value, so deleting an object with it is fine.

Failure contracts, because the pipeline branches on exit codes and greps stderr, so these are exact. A file path that can't be read: print exactly "error: cannot read PATH" to stderr and exit with code 2, where PATH is the path exactly as the user typed it on the command line, not resolved or absolutized. A file that reads fine but isn't valid JSON: "error: invalid JSON in PATH" to stderr, exit code 3. A file that parses but whose top-level value is not a JSON object (someone WILL feed it a bare array one day): "error: top-level value in PATH must be an object" to stderr, exit code 5. Files are processed strictly in command-line order and the first failing file wins — report it, stop immediately, don't go on to validate the rest. In every one of these failure cases stdout gets nothing. And no, we are not supporting comments or trailing commas or any JSON5-ish leniency; strict JSON, the parser's word is final. Same answer for schema validation — people asked for required-key checks and type hints while we were in there, and the ruling was that validation is a different tool's job. Don't bolt it on.

Two more things, both about how other tooling hooks in. Versioning: --version prints exactly "cfgmerge 2.1.0" and exits 0 — the release scripts pin on that literal string. And the pipeline's Python harness imports the script as a module rather than shelling out, so expose a function merge_configs(layers) that takes a list of already-parsed JSON objects (dicts, in precedence order) and returns the merged dict with deletions applied — the same result the CLI would print for those layers. Importing the module must not run the CLI and must not print anything; the usual main guard. On any successful run the CLI exits 0 and stderr stays completely silent — stdout is for the artifact, stderr is for errors, they never mix.

That's the whole brief, and I know it's a lot of exactlys for a hundred-odd lines of Python — that's the nature of a tool whose output other machines parse. Every requirement in this note came out of a real incident or a real argument, which is why I wrote them down in prose instead of bullet points: the context is the requirement half the time. One file, cfgmerge.py, repo root, stdlib only. If you skimmed, go back and reread before you write anything — the sed script also "mostly worked", and we all know how that ended.
"""

[task.weights]
intelligence = 0.3
tool_use = 0.0
diligence = 0.3
plot = 1.0
